<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <link rel="stylesheet" href="style.css">
        <title>Brick Breaker</title>
    </head>
    <body>

            <div class="bg-orb bg-orb-1"></div>
            <div class="bg-orb bg-orb-2"></div>
