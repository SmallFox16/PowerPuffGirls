<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <link rel="stylesheet" href="style.css">
        <title>Brick Breaker</title>
    </head>
    <body>
        <div class="bg-atmosphere">
            <div class="bg-orb bg-orb-1"></div>
            <div class="bg-orb bg-orb-2"></div>
            <div class="bg-orb bg-orb-3"></div>
        </div>
        <div class="bg-grain"></div>
        <div id="gamespace">
            <div id="brickContainer"></div>
            <div id="ball"></div>
            <div id="paddle"></div>
        </div>
        <div id="infoTracker">
            <div class="livesDisplay">
                Lives:
                <div class="life"></div>
                <div class="life"></div>
                <div class="life"></div>
            </div>
            <!--
                Score display placeholder — reserved for a future PBI.
                The score label and value should be inserted here when implemented.
                Styled via .scoreDisplay in style.css to match the livesDisplay row.
            -->
            <div class="scoreDisplay"></div>
            <!--
                Pause button — calls togglePause() defined in index.js.
                Positioned absolutely to the right side of #infoTracker via CSS.
                The Escape key is also wired to togglePause() in the keydown listener.
            -->
            <button id="pauseBtn" onclick="togglePause()">❚❚</button>
        </div>
        </div>
        <script type="text/javascript" src="index.js"></script>
    </body>
</html>
